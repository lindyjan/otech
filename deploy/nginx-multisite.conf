# ============================================================
# Nginx Multisite Configuration for Odoo 18
# ============================================================
# File: /etc/nginx/sites-available/odoo
# Symlink: /etc/nginx/sites-enabled/odoo
#
# Domains served:
#   - ovoco.co / www.ovoco.co
#   - books.ovoco.co
#   - property.ovoco.co
#   - i84mobile.com / www.i84mobile.com
#   - morelmediastudio.com / www.morelmediastudio.com
#   - test.ovoco.co (staging)
#   - test.i84mobile.com (staging)
#   - test.morelmediastudio.com (staging)
#
# Usage:
#   1. Copy to VPS:  scp deploy/nginx-multisite.conf root@VPS_IP:/etc/nginx/sites-available/odoo
#   2. Symlink:      ln -sf /etc/nginx/sites-available/odoo /etc/nginx/sites-enabled/odoo
#   3. Test:         nginx -t
#   4. Reload:       systemctl reload nginx
# ============================================================

# --- Upstreams ---
upstream odoo {
    server 127.0.0.1:8069;
}

upstream odoo-websocket {
    server 127.0.0.1:8072;
}

# --- Shared proxy settings (included in each server block) ---
# Using map for common headers instead of repeating them

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ============================================================
# i84mobile.com
# ============================================================

# HTTP -> HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name i84mobile.com www.i84mobile.com;
    return 301 https://i84mobile.com$request_uri;
}

# www -> non-www redirect
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.i84mobile.com;

    ssl_certificate /etc/letsencrypt/live/i84mobile.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/i84mobile.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://i84mobile.com$request_uri;
}

# Main HTTPS block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name i84mobile.com;

    ssl_certificate /etc/letsencrypt/live/i84mobile.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/i84mobile.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Timeouts
    proxy_read_timeout 720s;
    proxy_connect_timeout 720s;
    proxy_send_timeout 720s;

    # Proxy headers
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Host $host;

    # Logging
    access_log /var/log/nginx/i84mobile.access.log;
    error_log /var/log/nginx/i84mobile.error.log;

    # Websocket (longpolling / live chat)
    location /websocket {
        proxy_pass http://odoo-websocket;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # Static files (cached)
    location ~* /web/static/ {
        proxy_cache_valid 200 90m;
        proxy_buffering on;
        expires 864000;
        proxy_pass http://odoo;
    }

    # All other traffic
    location / {
        proxy_redirect off;
        proxy_pass http://odoo;
    }

    # Compression
    gzip on;
    gzip_types text/css text/plain text/xml application/xml application/javascript application/json image/svg+xml;
    gzip_min_length 1000;

    # Upload limit
    client_max_body_size 200m;
}

