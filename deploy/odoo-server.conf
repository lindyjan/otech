[options]
; ============================================================
; Odoo 18 Production/VPS Configuration (IONOS)
; ============================================================
; File location on VPS: /etc/odoo.conf
;
; This config supports multisite: all domains (ovoco.co,
; i84mobile.com, morelmediastudio.com) are served from a
; single Odoo instance with one database. Odoo's multi-website
; module handles per-domain content/themes.
; ============================================================

; --- Database ---
db_host = localhost
db_port = 5432
db_user = odoo
db_password = CHANGE_ME_TO_A_STRONG_PASSWORD

; Lock Odoo to a single database. All domains share this DB.
; Odoo's multi-website feature (Settings > Websites) routes
; each domain to the correct website within this one database.
db_name = odoo18prod
dbfilter = ^odoo18prod$

; --- Paths ---
addons_path = /opt/odoo/odoo18/addons,/opt/odoo/custom/addons,/opt/odoo/odoo18/odoo/addons

; --- Server ---
http_port = 8069
longpolling_port = 8072
proxy_mode = True
xmlrpc_interface = 127.0.0.1

; --- Logging ---
log_level = warn
log_file = /var/log/odoo/odoo.log
logrotate = True

; --- Security ---
; IMPORTANT: Change this to a strong, unique password!
admin_passwd = CHANGE_ME_TO_A_STRONG_PASSWORD
list_db = False

; --- Performance ---
workers = 4
max_cron_threads = 2
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_time_cpu = 600
limit_time_real = 1200

; --- Data ---
data_dir = /var/lib/odoo

; --- Default Apps ---
default_productivity_apps = True
